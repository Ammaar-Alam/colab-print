<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="ColabPrint — Direct Google Colab to PDF export">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f7fb"/>
      <stop offset="100%" stop-color="#eef1f8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="95%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="5%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <style>
      .title { font: 700 56px "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0b1220; letter-spacing: -0.02em; }
      .sub   { font: 500 20px "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tag   { font: 600 11px "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; letter-spacing: 0.1em; text-transform: uppercase; }
      .lbl   { font: 700 22px "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0b1220; }
      .lbl-s { font: 600 11px "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; letter-spacing: 0.08em; text-transform: uppercase; }
      .line  { stroke: #cbd5e1; stroke-width: 1.5; fill: none; }
      .line-dark { stroke: #334155; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#glow1)"/>
  <rect width="1200" height="320" fill="url(#glow2)"/>
  <rect x="0.5" y="0.5" width="1199" height="319" fill="none" stroke="rgba(15,23,42,0.08)"/>

  <g transform="translate(72, 92)">
    <text class="tag" x="0" y="0">COLABPRINT</text>
    <text class="title" x="0" y="48">Colab, printed right.</text>
    <text class="sub" x="0" y="90">Direct, pixel-faithful PDF export. No print dialog.</text>
    <g transform="translate(0, 118)">
      <rect x="0" y="0" width="148" height="34" rx="10" fill="url(#accent)"/>
      <text x="74" y="22" text-anchor="middle" fill="#f8fafc" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600">Build PDF</text>
      <rect x="160" y="0" width="118" height="34" rx="10" fill="#ffffff" stroke="rgba(15,23,42,0.1)"/>
      <text x="219" y="22" text-anchor="middle" fill="#0b1220" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600">Open source</text>
    </g>
  </g>

  <!-- Notebook mock -->
  <g transform="translate(730, 60)">
    <rect x="0" y="0" width="150" height="200" rx="12" fill="#ffffff" stroke="rgba(15,23,42,0.08)"/>
    <rect x="0" y="0" width="150" height="28" rx="12" fill="#f3f5fa"/>
    <circle cx="14" cy="14" r="4" fill="#ef4444"/>
    <circle cx="28" cy="14" r="4" fill="#f59e0b"/>
    <circle cx="42" cy="14" r="4" fill="#10b981"/>
    <rect x="12" y="46" width="96" height="10" rx="3" fill="#cbd5e1"/>
    <rect x="12" y="66" width="126" height="6" rx="2" fill="#e2e8f0"/>
    <rect x="12" y="78" width="110" height="6" rx="2" fill="#e2e8f0"/>
    <rect x="12" y="98" width="126" height="42" rx="6" fill="#f3f5fa" stroke="rgba(15,23,42,0.06)"/>
    <path d="M18 132 L28 120 L40 128 L52 112 L66 124 L82 118 L100 126 L116 116 L132 124" class="line" />
    <rect x="12" y="150" width="96" height="6" rx="2" fill="#e2e8f0"/>
    <rect x="12" y="162" width="70" height="6" rx="2" fill="#e2e8f0"/>
    <rect x="12" y="178" width="58" height="10" rx="3" fill="#cbd5e1"/>
    <text x="75" y="214" text-anchor="middle" class="lbl-s">Colab</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(900, 150)">
    <path d="M0 10 H60" stroke="#0b1220" stroke-width="2" fill="none"/>
    <path d="M54 4 L64 10 L54 16" stroke="#0b1220" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- PDF mock -->
  <g transform="translate(990, 60)">
    <rect x="0" y="0" width="150" height="200" rx="12" fill="#ffffff" stroke="rgba(15,23,42,0.08)"/>
    <path d="M120 0 L150 30 L120 30 Z" fill="#eef1f8"/>
    <rect x="14" y="24" width="90" height="8" rx="2" fill="#0b1220"/>
    <rect x="14" y="40" width="120" height="4" rx="2" fill="#cbd5e1"/>
    <rect x="14" y="48" width="110" height="4" rx="2" fill="#cbd5e1"/>
    <rect x="14" y="56" width="80" height="4" rx="2" fill="#cbd5e1"/>
    <rect x="14" y="72" width="122" height="54" rx="6" fill="#f3f5fa" stroke="rgba(15,23,42,0.06)"/>
    <path d="M20 110 L32 96 L44 104 L58 86 L72 100 L88 92 L108 104 L128 94" class="line-dark" />
    <rect x="14" y="138" width="122" height="4" rx="2" fill="#cbd5e1"/>
    <rect x="14" y="146" width="90" height="4" rx="2" fill="#cbd5e1"/>
    <rect x="14" y="154" width="110" height="4" rx="2" fill="#cbd5e1"/>
    <rect x="14" y="168" width="60" height="4" rx="2" fill="#cbd5e1"/>
    <text x="75" y="214" text-anchor="middle" class="lbl-s">PDF</text>
  </g>
</svg>
